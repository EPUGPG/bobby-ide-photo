<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Je vote Bobby Ide</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

canvas{
max-width:90%;
margin-top:20px;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Ajoute ton soutien à Bobby Ide</h2>
<p>Charge ta photo et télécharge ton image de campagne</p>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<br>

<button id="download" style="display:none;">Télécharger</button>

<script>

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("download");

upload.addEventListener("change", function(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event){

const img = new Image();

img.onload = function(){

canvas.width = 1080;
canvas.height = 1080;

ctx.drawImage(img,0,0,1080,1080);

const overlay = new Image();
overlay.src = "vignette.png";

overlay.onload = function(){

ctx.drawImage(overlay,0,0,1080,1080);
downloadBtn.style.display = "inline";

}

}

img.src = event.target.result;

}

reader.readAsDataURL(file);

});

downloadBtn.addEventListener("click",function(){

const link = document.createElement("a");
link.download="je-vote-bobby-ide.png";
link.href = canvas.toDataURL();
link.click();

});

</script>

</body>
</html>
