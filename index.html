<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Je vote Bobby Ide</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

canvas{
max-width:90%;
margin-top:20px;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Ajoute ton soutien à Bobby Ide</h2>
<p>Charge ta photo et télécharge ton image de campagne</p>

<input type="file" id="upload" accept="image/*">
<br>

<canvas id="canvas"></canvas>

<br>

<button id="download" class="download-btn">Télécharger</button>  
<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const overlay = new Image();
overlay.src = "vignette.png"; // ton PNG

upload.addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {

      canvas.width = 1000;
      canvas.height = 1000;

      // calcul pour garder les proportions
      const scale = Math.min(
        canvas.width / img.width,
        canvas.height / img.height
      );

      const x = (canvas.width / 2) - (img.width / 2) * scale;
      const y = (canvas.height / 2) - (img.height / 2) * scale;

      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

      overlay.onload = function(){
        ctx.drawImage(overlay,0,0,canvas.width,canvas.height);
      }

      if(overlay.complete){
        ctx.drawImage(overlay,0,0,canvas.width,canvas.height);
      }
    };

    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

function download(){
  const link = document.createElement("a");
  link.download = "photo-campagne.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>
