<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer ma photo de soutien - Bobby Ide</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:25px;
margin:0;
}

h1{
color:#9c1c6a;
}

#upload{
display:none;
}

.upload-btn{
display:inline-block;
background:#9c1c6a;
color:white;
padding:18px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.designs{
display:flex;
justify-content:center;
gap:20px;
margin:25px auto;
}

.designs img{
width:120px;
cursor:pointer;
border-radius:10px;
border:3px solid transparent;
transition:all 0.2s;
}

.designs img.active{
border-color:#9c1c6a;
transform:scale(1.15);
}

canvas{
max-width:95%;
margin-top:20px;
border-radius:10px;
}

.download-btn{
background:black;
color:white;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:10px;
margin-top:20px;
cursor:pointer;
display:none;
}

</style>

</head>

<body>

<h1>Créer ma photo de soutien</h1>

<label for="upload" class="upload-btn">
📷 Ajouter ma photo
</label>

<input type="file" id="upload" accept="image/*">

<p>Choisissez un design :</p>

<div class="designs">

<img id="design1" class="active" src="vignette1.png">
<img id="design2" src="vignette2.png">

</div>

<canvas id="canvas"></canvas>

<br>

<button id="download" class="download-btn">
Télécharger ma photo
</button>

<script>

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("download");

const design1 = document.getElementById("design1");
const design2 = document.getElementById("design2");

let overlay = new Image();
overlay.src = "vignette1.png";

let userImage = null;

design1.onclick = function(){
selectDesign("vignette1.png", design1);
}

design2.onclick = function(){
selectDesign("vignette2.png", design2);
}

function selectDesign(src, element){

overlay.src = src;

design1.classList.remove("active");
design2.classList.remove("active");

element.classList.add("active");

if(userImage){
drawImage();
}

}

upload.addEventListener("change", function(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event){

userImage = new Image();

userImage.onload = function(){
drawImage();
}

userImage.src = event.target.result;

}

reader.readAsDataURL(file);

});

function drawImage(){

canvas.width = 1080;
canvas.height = 1080;

ctx.clearRect(0,0,canvas.width,canvas.height);

let ratio = Math.min(
canvas.width / userImage.width,
canvas.height / userImage.height
);

let newWidth = userImage.width * ratio;
let newHeight = userImage.height * ratio;

let x = (canvas.width - newWidth) / 2;
let y = (canvas.height - newHeight) / 2;

ctx.drawImage(userImage,x,y,newWidth,newHeight);

ctx.drawImage(overlay,0,0,canvas.width,canvas.height);

downloadBtn.style.display="inline-block";

}

downloadBtn.onclick = function(){

canvas.toBlob(function(blob){

const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "photo-soutien-bobby-ide.png";

a.click();

});

}

</script>

</body>
</html>
