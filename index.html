<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Je vote Bobby Ide</title>

<style>

body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:30px;
margin:0;
}

h1{
color:#9c1c6a;
}

canvas{
max-width:95%;
margin-top:20px;
border-radius:12px;
}

#upload{
display:none;
}

.upload-btn{
display:inline-block;
background:#9c1c6a;
color:white;
padding:18px 28px;
font-size:20px;
border-radius:12px;
cursor:pointer;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.download-btn{
position:fixed;
top:15px;
right:15px;
background:black;
color:white;
border:none;
padding:12px 18px;
font-size:16px;
border-radius:10px;
cursor:pointer;
z-index:999;
display:none;
}

</style>

</head>

<body>

<h1>Je vote Bobby Ide</h1>

<label for="upload" class="upload-btn">
📷 Ajouter ma photo
</label>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<button id="download" class="download-btn">
Télécharger
</button>

<script>

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("download");

const overlay = new Image();
overlay.src = "vignette.png";

upload.addEventListener("change", function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){

const img = new Image();

img.onload = function(){

canvas.width = 1080;
canvas.height = 1080;

ctx.clearRect(0,0,canvas.width,canvas.height);

let ratio = Math.min(
canvas.width / img.width,
canvas.height / img.height
);

let newWidth = img.width * ratio;
let newHeight = img.height * ratio;

let x = (canvas.width - newWidth) / 2;
let y = (canvas.height - newHeight) / 2;

ctx.drawImage(img,x,y,newWidth,newHeight);

ctx.drawImage(overlay,0,0,canvas.width,canvas.height);

downloadBtn.style.display="block";

}

img.src = event.target.result;

}

reader.readAsDataURL(file);

});

downloadBtn.addEventListener("click",function(){

canvas.toBlob(function(blob){

const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "photo-campagne.png";
a.click();

});

});

</script>

</body>
</html>
