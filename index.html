<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Je vote Bobby Ide</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#fafafa;
      text-align:center;
      padding:28px 16px;
      margin:0;
    }

    h1{ color:#9c1c6a; margin:10px 0 6px; }
    p{ margin:0 0 18px; }

    /* Canvas */
    canvas{
      width: min(520px, 95vw);
      height: auto;
      margin-top:16px;
      border-radius:12px;
      background:white;
    }

    /* Gros bouton upload (on cache l'input natif) */
    #upload{ display:none; }

    .upload-btn{
      display:inline-block;
      background:#9c1c6a;
      color:#fff;
      padding:18px 26px;
      font-size:20px;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.18);
      user-select:none;
    }
    .upload-btn:active{ transform: scale(0.99); }

    /* Bouton télécharger fixé en haut à droite */
    .download-btn{
      position:fixed;
      top:16px;
      right:16px;
      background:#111;
      color:white;
      border:none;
      padding:12px 16px;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
      z-index:999;
      box-shadow:0 4px 10px rgba(0,0,0,0.25);
      display:none;
    }
    .download-btn:hover{ opacity:0.92; }

    /* Petit bloc aide iPhone */
    .hint{
      font-size:13px;
      opacity:0.75;
      margin-top:10px;
      line-height:1.3;
    }
  </style>
</head>

<body>
  <h1>Je vote Bobby Ide</h1>
  <p>Charge ta photo, ajoute la vignette, puis télécharge.</p>

  <label for="upload" class="upload-btn">📷 Ajouter ma photo</label>
  <input type="file" id="upload" accept="image/*" />

  <br />
  <canvas id="canvas"></canvas>

  <button id="download" class="download-btn">Télécharger</button>

  <div class="hint">
    Sur iPhone : si “Télécharger” ouvre un menu, choisis <b>Enregistrer l’image</b> ou <b>Enregistrer dans Fichiers</b>.
  </div>

  <script>
    const upload = document.getElementById("upload");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const downloadBtn = document.getElementById("download");

    // Charge la vignette une fois
    const overlay = new Image();
    overlay.src = "vignette.png";

    function drawCover(img, cw, ch) {
      // Remplit le canvas sans déformer (style "cover"), puis centre
      const scale = Math.max(cw / img.width, ch / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (cw - w) / 2;
      const y = (ch - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    }

    upload.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          // Format carré propre pour réseaux sociaux
          canvas.width = 1080;
          canvas.height = 1080;

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Dessine la photo sans déformation
          drawCover(img, canvas.width, canvas.height);

          // Dessine la vignette par-dessus (plein écran)
          const drawOverlay = () => {
            ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);
            downloadBtn.style.display = "block";
          };

          if (overlay.complete) drawOverlay();
          else overlay.onload = drawOverlay;
        };

        img.src = event.target.result;
      };

      reader.readAsDataURL(file);
    });

    // Téléchargement compatible iPhone (partage) + fallback onglet
    downloadBtn.addEventListener("click", async () => {
      canvas.toBlob(async (blob) => {
        if (!blob) return;

        const file = new File([blob], "photo-campagne.png", { type: "image/png" });

        // iOS / mobile : partage si possible (meilleur)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: "Photo de campagne",
              text: "Je vote Bobby Ide"
            });
            return;
          } catch (e) {
            // l'utilisateur peut annuler → on passe au fallback
          }
        }

        // Desktop / fallback : download classique
        const url = URL.createObjectURL(blob);

        // Certains navigateurs (iOS) ne respectent pas download → on ouvre un onglet
        const a = document.createElement("a");
        a.href = url;
        a.download = "photo-campagne.png";

        // Essaye download, sinon ouvre
        document.body.appendChild(a);
        a.click();
        a.remove();

        // Si iOS ignore download, l'utilisateur aura l'image ouverte/chargée → long press pour enregistrer
        // On garde l'URL un moment puis on libère
        setTimeout(() => URL.revokeObjectURL(url), 30000);
      }, "image/png");
    });
  </script>
</body>
</html>
